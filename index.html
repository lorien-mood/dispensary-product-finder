<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Your First Mood Product | Mood</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
      overflow-x: hidden;
    }

    * { box-sizing: border-box; }

    .quiz-wrapper {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .quiz-card {
      background: #FFFFFF;
      border-radius: 20px;
      border: 1px solid #E8E8E8;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .progress-track {
      height: 3px;
      background: #F0F0F0;
      display: none;
    }

    .progress-track.active { display: block; }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2D4A3E, #4A7A68);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 3px;
    }

    .quiz-content {
      padding: 36px 32px;
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .quiz-content.fade-out {
      opacity: 0;
      transform: translateY(12px);
    }

    .quiz-content.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    .intro { text-align: center; }
    .intro-icon { font-size: 44px; margin-bottom: 16px; }
    .intro h1 {
      font-family: 'Fraunces', serif;
      font-size: 26px; font-weight: 800; color: #1A1A1A;
      margin: 0 0 10px; line-height: 1.2; letter-spacing: -0.02em;
    }
    .intro p {
      color: #777; font-size: 14px; line-height: 1.6;
      margin: 0 auto 28px; max-width: 360px;
    }
    .btn-start {
      background: #2D4A3E; color: #FFF;
      border: none; border-radius: 12px; padding: 14px 44px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; letter-spacing: 0.02em; transition: all 0.2s ease;
    }
    .btn-start:hover { background: #3B5E4F; transform: scale(1.03); }

    .question-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .question-step { color: #999; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
    .question-icon { font-size: 22px; }
    .question-text {
      font-family: 'Fraunces', serif;
      font-size: 20px; font-weight: 700; color: #1A1A1A;
      margin: 0 0 22px; line-height: 1.3;
    }
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn {
      display: flex; align-items: center; gap: 12px;
      background: #FAFAFA; border: 1px solid #E8E8E8;
      border-radius: 12px; padding: 14px 18px; color: #333;
      font-size: 14px; font-weight: 500; cursor: pointer;
      font-family: inherit; text-align: left; transition: all 0.2s ease; width: 100%;
    }
    .option-btn:hover { background: #F0F7F4; border-color: #B8D4C8; }
    .option-btn.selected { background: #EBF5F0; border-color: #2D4A3E; transform: scale(0.98); }
    .option-emoji { font-size: 20px; flex-shrink: 0; }

    .result-header { text-align: center; margin-bottom: 22px; }
    .result-badge {
      display: inline-block; background: #EBF5F0; color: #2D4A3E;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; padding: 5px 14px; border-radius: 100px; margin-bottom: 14px;
    }
    .result-name {
      font-family: 'Fraunces', serif;
      font-size: 22px; font-weight: 800; color: #1A1A1A; margin: 0 0 4px; line-height: 1.25;
    }
    .result-type { color: #888; font-size: 13px; margin: 0 0 12px; }
    .terpene-tags { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; }
    .terpene-tag {
      display: inline-block; background: #F4F4F4;
      border: 1px solid #E0E0E0; border-radius: 100px;
      padding: 4px 12px; font-size: 12px; font-weight: 500; color: #555;
    }
    .result-card { border-radius: 16px; padding: 22px; margin-bottom: 20px; }
    .result-tagline {
      font-family: 'Fraunces', serif;
      font-size: 17px; font-weight: 700; color: #FFF; margin: 0 0 10px; line-height: 1.3;
    }
    .result-why { color: rgba(255,255,255,0.9); font-size: 13px; line-height: 1.65; margin: 0; }
    .result-actions { display: flex; gap: 10px; }
    .btn-shop {
      flex: 1; display: block; text-align: center; background: #2D4A3E; color: #FFF;
      border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700;
      text-decoration: none; font-family: inherit; transition: all 0.2s ease;
    }
    .btn-shop:hover { background: #3B5E4F; transform: scale(1.03); }
    .btn-retake {
      background: #FAFAFA; border: 1px solid #E0E0E0;
      color: #777; border-radius: 12px; padding: 14px 22px;
      font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.2s ease;
    }
    .btn-retake:hover { color: #333; border-color: #CCC; }
    .footer-note { text-align: center; color: #BBB; font-size: 11px; margin-top: 16px; line-height: 1.5; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="quiz-wrapper">
    <div class="quiz-card">
      <div class="progress-track" id="progressTrack">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="quiz-content fade-in" id="quizContent">
        <div id="introScreen" class="intro">
          <div class="intro-icon">🛒</div>
          <h1>Find Your First Mood Product</h1>
          <p>Answer 4 quick questions and we'll recommend the right product format and a specific Mood pick for you.</p>
          <button class="btn-start" id="btnStart">Get My Recommendation</button>
        </div>
        <div id="questionScreen" class="hidden"></div>
        <div id="resultScreen" class="hidden"></div>
      </div>
    </div>
    <p class="footer-note">Effects vary by individual. All Mood products are hemp-derived, third-party lab tested, and intended for adults 21+.</p>
  </div>

  <script>
    var QUESTIONS = [
      { id: "experience", question: "What's your experience level with cannabis?", icon: "🌱", options: [
        { label: "Completely new — never tried it", value: "new", icon: "🌱" },
        { label: "Tried it a few times", value: "some", icon: "🌿" },
        { label: "Regular user looking for a new source", value: "regular", icon: "🌳" }
      ]},
      { id: "format", question: "How do you want to consume?", icon: "💨", options: [
        { label: "Smoke or vape — I want faster effects", value: "inhale", icon: "💨" },
        { label: "Edibles — longer-lasting, no smoking", value: "edible", icon: "🍬" },
        { label: "Not sure — show me the best starting point", value: "unsure", icon: "🤔" }
      ]},
      { id: "goal", question: "What kind of experience are you after?", icon: "🎯", options: [
        { label: "Relaxation and winding down", value: "relax", icon: "🌙" },
        { label: "Energy, focus, or creativity", value: "energy", icon: "⚡" },
        { label: "Something balanced and versatile", value: "balanced", icon: "⚖️" },
        { label: "I want to explore a few options at once", value: "explore", icon: "🎁" }
      ]},
      { id: "priority", question: "What matters most to you in a cannabis source?", icon: "✅", options: [
        { label: "Lab testing and product safety", value: "safety", icon: "🔬" },
        { label: "Discreet packaging and privacy", value: "privacy", icon: "📦" },
        { label: "Variety and selection", value: "variety", icon: "🎨" },
        { label: "Value and transparent pricing", value: "value", icon: "💰" }
      ]}
    ];

    var RESULTS = {
      microdose: {
        name: "Micro-Dose Delta-9 THC Gummies",
        type: "Edible · Beginner-friendly · 5mg per gummy",
        tags: ["Lab-tested", "Low THC amount", "Discreet"],
        tagline: "The gentlest way to start your cannabis experience",
        why: "At 5mg per gummy, the Micro-Dose lets you ease in without guessing. Each piece is lab-tested with published COAs so you know exactly what you are getting. Discreet packaging, no dispensary visit, and a 100-day satisfaction guarantee make it a zero-pressure first step.",
        url: "https://mood.com/product/micro-dose-delta-9-thc-gummies",
        gradient: "linear-gradient(135deg, #5A7A6A 0%, #7A9A8A 100%)"
      },
      delta15: {
        name: "15mg Delta-9 THC Gummies",
        type: "Edible · Balanced everyday · Mood's #1 bestseller",
        tags: ["900,000+ customers", "Lab-tested", "15mg per gummy"],
        tagline: "Mood's most popular product for a reason",
        why: "The 15mg gummy is the go-to for experienced edible users who want a reliable, balanced experience. Backed by over 13,000 reviews and lab-tested with public COAs. Upfront pricing with 15% subscription savings available. Ships in discreet, heat-sealed packaging.",
        url: "https://mood.com/product/15mg-delta-9-thc-gummies",
        gradient: "linear-gradient(135deg, #2D4A3E 0%, #4A7A68 100%)"
      },
      sleepytime: {
        name: "Sleepytime Delta-9 THC Gummies",
        type: "Edible · Indica-leaning · Rest-focused",
        tags: ["THC + CBN + CBD", "Evening use", "Lab-tested"],
        tagline: "Deep relaxation for winding down",
        why: "Formulated with THC, CBN, and CBD for a full-body wind-down experience. The indica-leaning cannabinoid profile is built for restful evenings. Lab-tested with public COAs, backed by thousands of reviews, and covered by Mood's 100-day satisfaction guarantee.",
        url: "https://mood.com/product/sleepytime-delta-9-thc-gummies",
        gradient: "linear-gradient(135deg, #3B3455 0%, #5B4F82 100%)"
      },
      morning: {
        name: "Morning Delta-9 THC Gummies",
        type: "Edible · Sativa-leaning · Energizing",
        tags: ["THC + THCV", "Daytime use", "Lab-tested"],
        tagline: "Energized focus without the crash",
        why: "A daytime-friendly gummy with THCV for focus and energy. No caffeine, no crash. Lab-tested with published COAs, transparent pricing, and the same 100-day satisfaction guarantee across every Mood product. A solid pick if your goal is productive energy.",
        url: "https://mood.com/product/morning-delta-9-thc-gummies",
        gradient: "linear-gradient(135deg, #8B6914 0%, #A67D1A 100%)"
      },
      sparkPack: {
        name: "The Spark Pack Bundle",
        type: "Multi-format · Exploration bundle",
        tags: ["Flower + edibles + more", "Best value", "Lab-tested"],
        tagline: "Try multiple formats from one trusted source",
        why: "Not sure which format is right for you? The Spark Pack bundles multiple product types so you can compare flower, edibles, and more in one order. Every item is lab-tested with public COAs. It is the most efficient way to find your preferred format without committing to a full-size product of each.",
        url: "https://mood.com/shop",
        gradient: "linear-gradient(135deg, #8B4557 0%, #A65B6E 100%)"
      },
      sourDiesel: {
        name: "THCa Sour Diesel Disposable Vape",
        type: "Vape · Sativa-dominant · Fast-acting",
        tags: ["Quick onset", "Portable", "Lab-tested"],
        tagline: "Fast, portable, and precisely controllable",
        why: "For users who prefer inhaling over edibles, the Sour Diesel vape delivers quick onset effects with a sativa-forward profile. Great for energy and creative focus. Lab-tested with published COAs, discreet and pocket-sized, and no dispensary trip needed.",
        url: "https://mood.com/product/thca-sour-diesel-disposable-vape",
        gradient: "linear-gradient(135deg, #2D4A3E 0%, #3B5E4F 100%)"
      },
      flower: {
        name: "Mood THCa Flower",
        type: "Flower · Multiple strains · Three quality tiers",
        tags: ["Economy to Top Shelf", "COA per batch", "Ships discreet"],
        tagline: "Dispensary-quality flower shipped to your door",
        why: "Mood carries THCa flower across Economy, Premium, and Top Shelf tiers with multiple strains at each level. Every batch comes with a third-party COA. If you already know you prefer flower, you get dispensary-level variety without the dispensary markup or the trip.",
        url: "https://mood.com/shop/product-category/flower",
        gradient: "linear-gradient(135deg, #3E5A2D 0%, #5A7A44 100%)"
      }
    };

    var currentStep = -1;
    var answers = {};
    var quizContent = document.getElementById("quizContent");
    var introScreen = document.getElementById("introScreen");
    var questionScreen = document.getElementById("questionScreen");
    var resultScreen = document.getElementById("resultScreen");
    var progressTrack = document.getElementById("progressTrack");
    var progressBar = document.getElementById("progressBar");

    function sendHeight() {
      var h = document.documentElement.scrollHeight;
      window.parent.postMessage({ type: "quiz-resize", height: h }, "*");
    }

    document.getElementById("btnStart").addEventListener("click", function() {
      currentStep = 0; answers = {};
      transitionTo(showQuestion);
    });

    function transitionTo(cb) {
      quizContent.classList.remove("fade-in");
      quizContent.classList.add("fade-out");
      setTimeout(function() {
        cb();
        quizContent.classList.remove("fade-out");
        quizContent.classList.add("fade-in");
        setTimeout(sendHeight, 100);
      }, 300);
    }

    function showQuestion() {
      var q = QUESTIONS[currentStep];
      introScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      questionScreen.classList.remove("hidden");
      progressTrack.classList.add("active");
      progressBar.style.width = ((currentStep + 1) / QUESTIONS.length * 100) + "%";
      var html = '<div class="question-header"><span class="question-step">Question ' + (currentStep + 1) + ' of ' + QUESTIONS.length + '</span><span class="question-icon">' + q.icon + '</span></div><h2 class="question-text">' + q.question + '</h2><div class="options">';
      for (var i = 0; i < q.options.length; i++) {
        var o = q.options[i];
        html += '<button class="option-btn" data-qid="' + q.id + '" data-value="' + o.value + '"><span class="option-emoji">' + o.icon + '</span><span>' + o.label + '</span></button>';
      }
      html += '</div>';
      questionScreen.innerHTML = html;
      questionScreen.querySelectorAll(".option-btn").forEach(function(btn) { btn.addEventListener("click", handleOptionClick); });
    }

    function handleOptionClick(e) {
      var btn = e.currentTarget;
      btn.classList.add("selected");
      answers[btn.dataset.qid] = btn.dataset.value;
      questionScreen.querySelectorAll(".option-btn").forEach(function(b) { b.style.pointerEvents = "none"; });
      setTimeout(function() {
        if (currentStep < QUESTIONS.length - 1) { currentStep++; transitionTo(showQuestion); }
        else { transitionTo(function() { showResult(RESULTS[getResult(answers)]); }); }
      }, 400);
    }

    function getResult(a) {
      /* Explorer path */
      if (a.goal === "explore") return "sparkPack";

      /* Brand new users always get gentle picks */
      if (a.experience === "new") {
        if (a.format === "inhale") return "sourDiesel";
        return "microdose";
      }

      /* Inhale preference */
      if (a.format === "inhale") {
        if (a.goal === "energy") return "sourDiesel";
        return "flower";
      }

      /* Edible / unsure paths */
      if (a.goal === "relax") return "sleepytime";
      if (a.goal === "energy") return "morning";

      /* Balanced */
      if (a.experience === "some") return "delta15";
      if (a.experience === "regular") return "delta15";

      return "delta15";
    }

    function showResult(r) {
      questionScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      progressTrack.classList.remove("active");
      var tagHtml = '';
      for (var i = 0; i < r.tags.length; i++) { tagHtml += '<span class="terpene-tag">' + r.tags[i] + '</span>'; }
      resultScreen.innerHTML = '<div class="result-header"><div class="result-badge">Your Match</div><h2 class="result-name">' + r.name + '</h2><p class="result-type">' + r.type + '</p><div class="terpene-tags">' + tagHtml + '</div></div><div class="result-card" style="background:' + r.gradient + '"><p class="result-tagline">' + r.tagline + '</p><p class="result-why">' + r.why + '</p></div><div class="result-actions"><a href="' + r.url + '" target="_blank" rel="noopener noreferrer" class="btn-shop">Shop Now</a><button class="btn-retake" id="btnRetake">Retake</button></div>';
      document.getElementById("btnRetake").addEventListener("click", function() {
        currentStep = -1; answers = {};
        transitionTo(function() {
          questionScreen.classList.add("hidden"); resultScreen.classList.add("hidden");
          introScreen.classList.remove("hidden"); progressTrack.classList.remove("active");
        });
      });
    }

    window.addEventListener("load", sendHeight);
  </script>
</body>
</html>
